<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>APK Security Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .card { border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
        .btn-primary:hover { transform: scale(1.02); }
        .btn-history {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            margin-bottom: 20px;
        }
        .btn-history:hover {
            transform: scale(1.02);
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
        }
        .btn-group-custom {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .btn-group-custom .btn {
            flex: 1;
        }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white text-center" style="border-radius: 20px 20px 0 0;">
                    <h1 class="mb-0">🔒 APK Security Analyzer</h1>
                    <p class="mb-0">Analyse statique d'applications Android</p>
                </div>
                <div class="card-body p-5">
                    <!-- Bouton vers l'historique -->
                    <div class="btn-group-custom">
                        <a href="/history" class="btn btn-history btn-lg">
                            📊 Voir l'historique des analyses
                        </a>
                    </div>

                    <hr class="my-4">

                    <form method="post" action="/analyze" enctype="multipart/form-data">
                        <div class="mb-4">
                            <label class="form-label fw-bold">📱 Sélectionner une APK</label>
                            <input type="file" name="file" class="form-control form-control-lg" accept=".apk" required>
                            <div class="form-text">Téléchargez un fichier .apk pour analyser sa sécurité</div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100">🚀 Analyser l'APK</button>
                    </form>
                </div>
                <div class="card-footer text-muted text-center">
                    🔒 SecureAPK Analyzer - Analyse statique avancée | 📊 <a href="/history">Historique des analyses</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
